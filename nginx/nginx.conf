events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml application/x-font-ttf font/opentype image/svg+xml;

    upstream backend {
        server backend:8000;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name farmertohome.in www.farmertohome.in;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name farmertohome.in www.farmertohome.in;

        ssl_certificate     /etc/letsencrypt/live/farmertohome.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/farmertohome.in/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API → FastAPI backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            client_max_body_size 20M;
        }

        # React SPA
        location / {
            root /var/www/web;
            try_files $uri $uri/ /index.html;
        }

        # No-cache for HTML
        location ~* \.html$ {
            root /var/www/web;
            expires off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Long-term cache for hashed assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            root /var/www/web;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
